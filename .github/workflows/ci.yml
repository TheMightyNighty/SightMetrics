name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  # ---- Job 1: Lint + Unit Tests (kein Docker nötig) -------------------------
  lint-and-unit:
    name: "Lint + Unit (PHP ${{ matrix.php }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - name: PHP ${{ matrix.php }} einrichten
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - name: Composer-Cache-Key
        id: cache-key
        run: echo "key=${{ hashFiles('extension/sight_metrics/composer.json') }}" >> "$GITHUB_OUTPUT"

      - name: Composer-Cache laden
        uses: actions/cache@v4
        with:
          path: extension/sight_metrics/vendor
          key: composer-${{ matrix.php }}-${{ steps.cache-key.outputs.key }}
          restore-keys: composer-${{ matrix.php }}-

      - name: composer install
        working-directory: extension/sight_metrics
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: PHPStan
        working-directory: extension/sight_metrics
        run: vendor/bin/phpstan analyse -c phpstan.ci.neon --no-progress

      - name: php-cs-fixer (dry-run)
        working-directory: extension/sight_metrics
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --config=.php-cs-fixer.dist.php

      - name: PHPUnit (Unit Tests)
        working-directory: extension/sight_metrics
        run: vendor/bin/phpunit -c phpunit.xml.dist

  # ---- Job 2: DuckDB Pipeline-Test (selbst-contained) -----------------------
  pipeline:
    name: "Pipeline (DuckDB)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: DuckDB v1.5.4 herunterladen
        run: |
          mkdir -p ingestion/bin
          curl -fsSL -o /tmp/duckdb.zip \
            https://github.com/duckdb/duckdb/releases/download/v1.5.4/duckdb_cli-linux-amd64.zip
          unzip -o /tmp/duckdb.zip duckdb -d ingestion/bin/
          chmod +x ingestion/bin/duckdb

      - name: Pipeline-Test (SQL-Kennzahlen + Envsubst + Purge + Log-Format + Backup/Notify/Sharding/Rotation/Lock)
        run: bash ingestion/tests/run.sh

  # ---- Job 3: Functional Tests (TYPO3 + SQLite, kein Docker nötig) ----------
  functional:
    name: "Functional (PHP ${{ matrix.php }}, TYPO3 ${{ matrix.typo3 }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        typo3: ['^13.4', '^14.0']
        # TYPO3 v14 setzt PHP >= 8.3 voraus -> ungültige Kombi ausschließen.
        exclude:
          - php: '8.2'
            typo3: '^14.0'
        # testing-framework ist je TYPO3-Hauptversion unterschiedlich: 8.x→v13, 9.x→v14.
        include:
          - typo3: '^13.4'
            tf: '^8.0'
          - typo3: '^14.0'
            tf: '^9.0'

    steps:
      - uses: actions/checkout@v4

      - name: PHP ${{ matrix.php }} einrichten
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          extensions: pdo_sqlite
          coverage: none

      # Kein vendor-Cache: die TYPO3-Version variiert pro Matrix-Eintrag.
      - name: TYPO3-Version festlegen (${{ matrix.typo3 }})
        working-directory: extension/sight_metrics
        run: |
          composer require --no-update \
            typo3/cms-core:"${{ matrix.typo3 }}" \
            typo3/cms-backend:"${{ matrix.typo3 }}"
          composer require --no-update --dev \
            typo3/testing-framework:"${{ matrix.tf }}"

      - name: composer update
        working-directory: extension/sight_metrics
        run: composer update --no-interaction --no-progress --prefer-dist --with-all-dependencies

      - name: PHPUnit (Functional Tests)
        working-directory: extension/sight_metrics
        run: vendor/bin/phpunit -c phpunit.functional.xml.dist

  # ---- Skipped in CI (brauchen laufenden Docker-Stack) ----------------------
  # Suite 2 Smoke  → docker exec sightmetrics-web php vendor/bin/typo3 sightmetrics:smoke
  # Suite 3 E2E    → Puppeteer gegen http://localhost:8091
  # Lokal ausführen via: bash extension/run-tests.sh
