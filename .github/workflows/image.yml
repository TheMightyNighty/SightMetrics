name: Container-Image

# Baut und veröffentlicht das Ingestion-Image nach GHCR.
# Trigger: Versions-Tags (v1.2.3) + manuell (workflow_dispatch).
# Betreiber pinnen das Image per Digest (siehe Job-Ausgabe und
# ingestion/scheduling/k8s/cronjob.yaml).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: "Ingestion-Image -> GHCR"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: GHCR-Login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image-Metadaten (Tags/Labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/sightmetrics-ingestion
          tags: |
            type=semver,pattern={{version}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & Push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ingestion
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Digest fuer Pinning ausgeben
        run: |
          echo "Image-Digest (fuer cronjob.yaml):"
          echo "ghcr.io/${{ github.repository_owner }}/sightmetrics-ingestion@${{ steps.push.outputs.digest }}"
