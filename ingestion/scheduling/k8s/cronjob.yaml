# ===========================================================================
# SightMetrics ingestion – nightly one-shot as a Kubernetes CronJob.
# Copy-paste ready; adjust: image (digest!), volumes (logs/geo), namespace.
# Conforms to Pod Security Standard "restricted" (non-root, read-only rootFS,
# no capabilities, seccomp RuntimeDefault).
#
# Requires in the same namespace:
#   - PVC        sightmetrics-state      (pvc-state.yaml)          required
#   - Secret     sightmetrics-cube-dsn   (secret-cube-dsn.example.yaml)
#   - ConfigMap  sightmetrics-sites      (configmap-sites.example.yaml)
#   - Access to the webserver logs (PVC/NFS, read-only) OR instead
#     use fetch_loki_logs.sh as args (then no logs volume needed)
#   - GeoIP dataset (not in the image, license-restricted – runbook §3a):
#     mount as a PVC/volume and set SM_GEO_PATH
# ===========================================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: sightmetrics-import
  labels:
    app.kubernetes.io/name: sightmetrics-ingestion
spec:
  schedule: "15 2 * * *"
  timeZone: "Europe/Berlin"
  # Forbid complements the flock in the script: no second job while one is running.
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 3600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1                # 1 retry, then job=failed -> alerting
      activeDeadlineSeconds: 7200    # hard-kill hangs (2 h)
      template:
        metadata:
          labels:
            app.kubernetes.io/name: sightmetrics-ingestion
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001         # UID/GID from ingestion/Dockerfile
            runAsGroup: 10001
            fsGroup: 10001           # PVC files writable for the group
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: import
              # ALWAYS pin by digest (reproducible, no tag hijacking):
              #   ghcr.io/<org>/sightmetrics-ingestion@sha256:<digest>
              # The digest is provided by the CI workflow (.github/workflows/image.yml).
              image: ghcr.io/ORG/sightmetrics-ingestion@sha256:DIGEST
              args: ["run_all.sh"]
              env:
                - { name: STATE_DIR,     value: /state }
                - { name: LOG_DIR,       value: /state/import-logs }
                - { name: PARALLEL,      value: "2" }
                - { name: SM_TZ,         value: Europe/Berlin }
                - { name: SITES_CONF,    value: /etc/sightmetrics/sites.conf }
                - { name: CUBE_DSN_FILE, value: /etc/sightmetrics-secrets/cube_dsn }
                - { name: SM_GEO_PATH,   value: /geo/country-ipv4-num.csv }
                # optional: device-detector bot list (tools/fetch_bot_list.sh,
                # runbook §3) mount as a volume and enable here:
                # - { name: SM_BOT_RE_PATH, value: /bots/bot_regex.list }
                # optional: heartbeat (healthchecks.io or similar), alert webhook
                # - { name: HEALTHCHECK_URL, value: "https://hc-ping.com/…" }
                # - { name: ALERT_WEBHOOK,   value: "https://hooks.slack.com/…" }
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              resources:
                # Guideline: MaxRSS × PARALLEL (runbook §10, state/metrics.log)
                requests:
                  cpu: 500m
                  memory: 512Mi
                limits:
                  cpu: "2"
                  memory: 2Gi
              volumeMounts:
                - { name: state,      mountPath: /state }
                - { name: tmp,        mountPath: /tmp }
                - { name: logs,       mountPath: /logs,                    readOnly: true }
                - { name: sites-conf, mountPath: /etc/sightmetrics,        readOnly: true }
                - { name: cube-dsn,   mountPath: /etc/sightmetrics-secrets, readOnly: true }
                - { name: geo,        mountPath: /geo,                     readOnly: true }
          volumes:
            # Required: offset state must be persistent, otherwise a full reimport every run.
            # WARNING: flock is unreliable on NFS-based PVCs – use block storage
            # (RWO) for /state; concurrencyPolicy: Forbid additionally catches the
            # parallel case at the scheduler level.
            - name: state
              persistentVolumeClaim:
                claimName: sightmetrics-state
            # readOnlyRootFilesystem: /tmp as emptyDir (mktemp intermediate files)
            - name: tmp
              emptyDir:
                sizeLimit: 1Gi
            # Webserver logs read-only – depending on the environment PVC, NFS or hostPath.
            # Alternative without a logs volume: Loki path (fetch_loki_logs.sh).
            - name: logs
              persistentVolumeClaim:
                claimName: webserver-logs
                readOnly: true
            - name: sites-conf
              configMap:
                name: sightmetrics-sites
            - name: cube-dsn
              secret:
                secretName: sightmetrics-cube-dsn
            # GeoIP CSV (several MB -> PVC instead of ConfigMap; sourcing: runbook §3a)
            - name: geo
              persistentVolumeClaim:
                claimName: sightmetrics-geo
                readOnly: true
