# DSN of the write user (cube_rw) as a secret – do NOT commit this example,
# manage it via External Secrets/SOPS/sealed-secrets or similar instead.
# Mounted as a file at /etc/sightmetrics-secrets/cube_dsn
# (CUBE_DSN_FILE, see cronjob.yaml). Rotation: rotate_cube_secret.sh (runbook §6).
apiVersion: v1
kind: Secret
metadata:
  name: sightmetrics-cube-dsn
  labels:
    app.kubernetes.io/name: sightmetrics-ingestion
type: Opaque
stringData:
  cube_dsn: "host=mariadb.example.svc port=3306 user=cube_rw password=CHANGE-ME database=analytics"
