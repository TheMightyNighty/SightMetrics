# DSN des Schreib-Users (cube_rw) als Secret – NICHT dieses Beispiel committen,
# sondern per External-Secrets/SOPS/sealed-secrets o. ä. verwalten.
# Wird als Datei unter /etc/sightmetrics-secrets/cube_dsn gemountet
# (CUBE_DSN_FILE, siehe cronjob.yaml). Rotation: rotate_cube_secret.sh (Runbook §6).
apiVersion: v1
kind: Secret
metadata:
  name: sightmetrics-cube-dsn
  labels:
    app.kubernetes.io/name: sightmetrics-ingestion
type: Opaque
stringData:
  cube_dsn: "host=mariadb.example.svc port=3306 user=cube_rw password=CHANGE-ME database=analytics"
