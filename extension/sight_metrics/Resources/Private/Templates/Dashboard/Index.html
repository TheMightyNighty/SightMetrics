<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<f:comment>All labels from locallang_mod.xlf (default English, de.locallang_mod.xlf German).</f:comment>
<f:variable name="ll" value="LLL:EXT:sight_metrics/Resources/Private/Language/locallang_mod.xlf:" />

<f:if condition="{error}">
<f:then>
    <div class="sm-notice">
        <div class="ico warn" aria-hidden="true">⚠</div>
        <h1>{error.title}</h1>
        <p>{error.message}</p>
        <f:if condition="{error.technical}">
            <pre>{error.technical}</pre>
        </f:if>
    </div>
</f:then>
<f:else>

<f:if condition="{noAccess}">
<f:then>
    <div class="sm-notice">
        <div class="ico lock" aria-hidden="true">🔒</div>
        <h1><f:translate key="{ll}tpl.noAccess.title" /></h1>
        <p><f:translate key="{ll}tpl.noAccess.text" /></p>
    </div>
</f:then>
<f:else>
<f:if condition="{onboarding}">
<f:then>
    <div class="sm-notice sm-notice-wide">
        <div class="ico" aria-hidden="true">📊</div>
        <h1><f:translate key="{ll}tpl.ob.title" /></h1>
        <p><f:translate key="{ll}tpl.ob.intro" /></p>
        <ol>
            <li>
                <strong><f:translate key="{ll}tpl.ob.step1.title" /></strong><br>
                <span><f:translate key="{ll}tpl.ob.step1.text" /></span>
            </li>
            <li>
                <strong><f:translate key="{ll}tpl.ob.step2.title" /></strong><br>
                <span><f:translate key="{ll}tpl.ob.step2.text" /></span>
            </li>
            <li>
                <strong><f:translate key="{ll}tpl.ob.step3.title" /></strong><br>
                <span><f:translate key="{ll}tpl.ob.step3.text" /></span><br>
                <code>vendor/bin/typo3 sightmetrics:health</code>
            </li>
        </ol>
        <p class="docs">
            <a href="https://github.com/TheMIghtyNighty/SightMetrics" target="_blank" rel="noopener noreferrer">
                <f:translate key="{ll}tpl.ob.docs" /></a>
        </p>
    </div>
</f:then>
<f:else>

<script type="application/json" id="sm-data"><f:format.raw>{payload}</f:format.raw></script>

<div id="sightmetrics">
    <div class="sm-bar">
        <div class="sm-site" id="w-site">–</div>
        <select id="w-siteselect" class="sm-siteselect" aria-label="{f:translate(key: '{ll}tpl.siteSelect')}"></select>
        <div class="sm-spacer"></div>
        <label for="w-preset"><f:translate key="{ll}tpl.period" /></label>
        <select id="w-preset" class="sm-preset" aria-label="{f:translate(key: '{ll}tpl.periodSelect')}"></select>
        <span id="w-custom" class="sm-custom" hidden>
            <label for="w-month"><f:translate key="{ll}tpl.month" /></label>
            <input type="month" id="w-month" aria-label="{f:translate(key: '{ll}tpl.monthPick')}">
            <label for="w-from" class="sm-gap"><f:translate key="{ll}tpl.from" /></label><input type="date" id="w-from">
            <label for="w-to" class="sm-gap"><f:translate key="{ll}tpl.to" /></label><input type="date" id="w-to">
        </span>
        <label class="sm-cmp"><input type="checkbox" id="w-cmp"> <f:translate key="{ll}tpl.compare" /></label>
        <button type="button" id="w-csv" class="sm-btn" title="{f:translate(key: '{ll}tpl.csvTitle')}">CSV</button>
        <button type="button" id="w-pdf" class="sm-btn" title="{f:translate(key: '{ll}tpl.pdfTitle')}">PDF</button>
        <span class="sm-gen" id="w-gen"></span>
        <span class="sm-gen" id="w-version"></span>
    </div>

    <div class="sm-kpis" role="region" aria-label="{f:translate(key: '{ll}tpl.kpiRegion')}">
        <div class="sm-kpi"><div class="v" id="k-visits">–</div><div class="d" id="d-visits"></div><div class="l"><f:translate key="{ll}tpl.kpi.visits" /></div></div>
        <div class="sm-kpi"><div class="v" id="k-uniq">–</div><div class="d" id="d-uniq"></div><div class="l"><f:translate key="{ll}tpl.kpi.uniques" /></div></div>
        <div class="sm-kpi"><div class="v" id="k-pv">–</div><div class="d" id="d-pv"></div><div class="l"><f:translate key="{ll}tpl.kpi.pageviews" /></div></div>
        <div class="sm-kpi"><div class="v" id="k-bounce">–</div><div class="d" id="d-bounce"></div><div class="l"><f:translate key="{ll}tpl.kpi.bounce" /></div></div>
        <div class="sm-kpi"><div class="v" id="k-band">–</div><div class="d" id="d-band"></div><div class="l"><f:translate key="{ll}tpl.kpi.bandwidth" /></div></div>
    </div>

    <div class="sm-card"><h2><f:translate key="{ll}tpl.sec.trend" /></h2><div class="sm-chart"><canvas id="w-time" role="img" aria-label="{f:translate(key: '{ll}tpl.aria.trend')}"></canvas></div></div>

    <h2 class="sm-sec"><f:translate key="{ll}tpl.sec.visitors" /></h2>
    <div class="sm-card"><h3><f:translate key="{ll}tpl.panel.map" /></h3><div id="w-map" class="sm-chart map" role="img" aria-label="{f:translate(key: '{ll}tpl.aria.map')}"></div></div>
    <div class="sm-grid sm-g2">
        <div class="sm-card"><h3><f:translate key="{ll}tpl.panel.countries" /></h3><div id="bl-country" class="barlist"></div></div>
        <div class="sm-card"><h3><f:translate key="{ll}tpl.panel.hours" /></h3><div class="sm-chart"><canvas id="w-hour" role="img" aria-label="{f:translate(key: '{ll}tpl.aria.hours')}"></canvas></div></div>
    </div>
    <div class="sm-grid sm-g3">
        <div class="sm-card"><h3><f:translate key="{ll}tpl.panel.browser" /> <span class="sm-hint"><f:translate key="{ll}tpl.hint.versions" /></span></h3><div id="bl-browser" class="barlist"></div></div>
        <div class="sm-card"><h3><f:translate key="{ll}tpl.panel.os" /> <span class="sm-hint"><f:translate key="{ll}tpl.hint.versions" /></span></h3><div id="bl-os" class="barlist"></div></div>
        <div class="sm-card"><h3><f:translate key="{ll}tpl.panel.device" /> <span class="sm-hint"><f:translate key="{ll}tpl.hint.models" /></span></h3><div id="bl-device" class="barlist"></div></div>
    </div>

    <h2 class="sm-sec"><f:translate key="{ll}tpl.sec.acquisition" /></h2>
    <div class="sm-grid sm-g3">
        <div class="sm-card"><h3><f:translate key="{ll}tpl.panel.refTypes" /> <span class="sm-hint"><f:translate key="{ll}tpl.hint.sources" /></span></h3><div id="bl-reftype" class="barlist"></div></div>
        <div class="sm-card"><h3><f:translate key="{ll}tpl.panel.refUrls" /></h3><div id="bl-refurl" class="barlist"></div></div>
        <div class="sm-card"><h3><f:translate key="{ll}tpl.panel.keywords" /></h3><div id="bl-keyword" class="barlist"></div></div>
    </div>

    <h2 class="sm-sec"><f:translate key="{ll}tpl.sec.behavior" /></h2>
    <div class="sm-grid sm-g23">
        <div class="sm-card"><h3><f:translate key="{ll}tpl.panel.pages" /></h3><div id="w-tree" class="sm-tree"></div></div>
        <div>
            <div class="sm-card"><h3><f:translate key="{ll}tpl.panel.entry" /></h3><div id="bl-entry" class="barlist"></div></div>
            <div class="sm-card"><h3><f:translate key="{ll}tpl.panel.exit" /></h3><div id="bl-exit" class="barlist"></div></div>
        </div>
    </div>
    <div class="sm-grid sm-g3">
        <div class="sm-card"><h3><f:translate key="{ll}tpl.panel.downloads" /></h3><div id="bl-download" class="barlist"></div></div>
        <div class="sm-card"><h3><f:translate key="{ll}tpl.panel.status" /></h3><div id="bl-status" class="barlist"></div></div>
        <div class="sm-card"><h3><f:translate key="{ll}tpl.panel.methods" /></h3><div id="bl-method" class="barlist"></div></div>
    </div>

    <p class="sm-foot"><f:translate key="{ll}tpl.foot" /></p>
</div>

</f:else>
</f:if>
</f:else>
</f:if>

</f:else>
</f:if>

</html>
