name: sightmetrics   # project name pinned -> existing volume sightmetrics_dbdata is preserved

services:
  db:
    image: mariadb:11.4
    container_name: sightmetrics-db
    environment:
      MARIADB_ROOT_PASSWORD: "${MARIADB_ROOT_PASSWORD:-root}"
      MARIADB_DATABASE: t3
      MARIADB_USER: t3
      MARIADB_PASSWORD: "${MARIADB_T3_PASSWORD:-t3}"
      CUBE_RW_PASSWORD: "${CUBE_RW_PASSWORD:-cube_rw}"
      CUBE_RO_PASSWORD: "${CUBE_RO_PASSWORD:-report_ro}"
    volumes:
      - dbdata:/var/lib/mysql
      - ./initdb:/docker-entrypoint-initdb.d:ro
    ports:
      - "3307:3306"          # host DuckDB writes the cube here
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build: .
    container_name: sightmetrics-web
    depends_on:
      db:
        condition: service_healthy
    environment:
      PHP_CLI_SERVER_WORKERS: "6"   # backend makes parallel requests
      TYPO3_CONTEXT: "Development"   # shows real error messages
      CUBE_RO_PASSWORD: "${CUBE_RO_PASSWORD:-report_ro}"
    volumes:
      - ./app:/var/www/html
      # Extension source mounted live: changes to extension/sight_metrics/
      # are immediately visible in the container, no sync script/copy step needed.
      - ../extension/sight_metrics:/var/www/html/packages/sight_metrics:ro
    ports:
      - "8091:80"
    working_dir: /var/www/html
    # Only start the server once TYPO3 is installed (public/ exists)
    command: >
      bash -c "until [ -f /var/www/html/public/index.php ]; do echo 'warte auf TYPO3-Install...'; sleep 5; done;
               echo 'Starte PHP-Server'; php -S 0.0.0.0:80 -t public"

  # Package A as a container (one-shot). Only via profile 'import':
  #   All sites (default):   docker compose --profile import run --rm ingestion
  #   Single import:          docker compose --profile import run --rm ingestion load_cube.sh /logs/<file> "Site-Name" <id>
  ingestion:
    build: ../ingestion
    image: sightmetrics-ingestion
    profiles: ["import"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      CUBE_DSN: "${CUBE_DSN}"
      STATE_DIR: /state
    # Demo: /state is a bind mount of the host user -> run as that UID.
    # The production image is non-root (UID 10001, see ingestion/Dockerfile);
    # for a differing host UID: set SIGHTMETRICS_UID/GID in demo/.env.
    user: "${SIGHTMETRICS_UID:-1000}:${SIGHTMETRICS_GID:-1000}"
    volumes:
      - ../logs:/logs:ro
      - ../state:/state   # offset state persistent across container restarts

volumes:
  dbdata:
