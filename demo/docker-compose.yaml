name: sightmetrics   # project name pinned -> existing volume sightmetrics_dbdata is preserved

services:
  db:
    image: mariadb:11.4
    container_name: sightmetrics-db
    environment:
      MARIADB_ROOT_PASSWORD: "${MARIADB_ROOT_PASSWORD:-root}"
      MARIADB_DATABASE: "${MARIADB_DATABASE:-t3}"
      MARIADB_USER: "${MARIADB_USER:-t3}"
      MARIADB_PASSWORD: "${MARIADB_PASSWORD:-t3}"
      CUBE_RW_PASSWORD: "${CUBE_RW_PASSWORD:-cube_rw}"
      CUBE_RO_PASSWORD: "${CUBE_RO_PASSWORD:-report_ro}"
    volumes:
      - dbdata:/var/lib/mysql
      - ./initdb:/docker-entrypoint-initdb.d:ro
    ports:
      - "3307:3306"          # host DuckDB writes the cube here
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build: .
    container_name: sightmetrics-web
    depends_on:
      db:
        condition: service_healthy
    environment:
      PHP_CLI_SERVER_WORKERS: "6"   # backend makes parallel requests
      TYPO3_CONTEXT: "Development"   # shows real error messages
      CUBE_RO_PASSWORD: "${CUBE_RO_PASSWORD:-report_ro}"
      MARIADB_DATABASE: "${MARIADB_DATABASE:-t3}"
      MARIADB_USER: "${MARIADB_USER:-t3}"
      MARIADB_PASSWORD: "${MARIADB_PASSWORD:-t3}"
      PROJECT_NAME: "${PROJECT_NAME:-SightMetrics Demo}"
      LIVE_SITE_URL: "${LIVE_SITE_URL:-http://localhost:8091/}"
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-SightMetrics-Admin-2026!}"
    volumes:
      - ./app:/var/www/html
      # Extension source mounted live: changes to extension/sight_metrics/
      # are immediately visible in the container, no sync script/copy step needed.
      #
      # NICHT nach /var/www/html/packages/... mounten! Ein Bind-Mount INNERHALB
      # eines anderen Bind-Mounts (hier ./app) wird von Docker Desktop unter
      # macOS (VirtioFS/gRPC-FUSE) stillschweigend ignoriert – der Container
      # sieht dann das leere Verzeichnis des äußeren Mounts. Deshalb an einen
      # eigenständigen Pfad mounten; der Entrypoint verlinkt ihn nach packages/.
      - ../extension/sight_metrics:/packages/sight_metrics:ro
    ports:
      - "8091:80"
    working_dir: /var/www/html
    # Installation + Serverstart erledigt der Entrypoint (siehe Dockerfile CMD:
    # entrypoint.sh). Kein command-Override mehr nötig.

  # Package A as a container (one-shot). Only via profile 'import':
  #   All sites (default):   docker compose --profile import run --rm ingestion
  #   Single import:          docker compose --profile import run --rm ingestion load_cube.sh /logs/<file> "Site-Name" <id>
  ingestion:
    build:
      context: ../ingestion
      dockerfile: Dockerfile-development
    container_name: sightmetrics-ingestion
    # Container mit Bash-Session starten, damit man direkt in den Container reingehen kann.
    # tty: true hält den Container am Leben
    #
    #   docker exec -it sightmetrics-ingestion bash
    entrypoint: ["bash"]
    tty: true
    depends_on:
      db:
        condition: service_healthy
    environment:
      CUBE_DSN: "${CUBE_DSN:-host=db port=3306 user=cube_rw password=cube_rw database=analytics}"
      STATE_DIR: /state
      LOG_DIR: /state/import-logs
    volumes:
      # Mountpoint /app: Zugriff auf die Skripte im Container (z.B. load_cube.sh)
      # damit muss der Container nicht neu gebaut werden, wenn Skripte geaendert werden.
      - ../ingestion:/app
      # Offset-State persistent über Container-Neustarts
      - ../state:/state

  # Alternative Log-Quelle: Loki. fetch_loki_logs.sh im ingestion-Container
  # erreicht es unter http://loki:3100 (gleiches Compose-Netz).
  loki:
    image: grafana/loki:3
    container_name: sightmetrics-loki
    # Loki läuft im Image als uid 10001; das frische Named-Volume gehört root.
    # Für die Wegwerf-Demo einfach als root laufen lassen (schreibt nach /data).
    user: root
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - loki:/data
      - ./loki-config.yaml:/etc/loki/local-config.yaml:ro

  # Grafana zum Erkunden/Befüllen von Loki (anonymer Admin, kein Login nötig).
  # UI: http://localhost:3000  – Loki ist als Default-Datenquelle vorprovisioniert.
  grafana:
    image: grafana/grafana
    container_name: sightmetrics-grafana
    ports:
      - "3000:3000"
    environment:
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_DEFAULT_THEME: "system"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_BASIC_ENABLED: "false"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro

volumes:
  dbdata:
  loki:
